<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CRITICAL FIX 3: Mobile View (100dvh) settings */
        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .sidebar {
            width: 260px;
            background-color: #020617;
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            flex-shrink: 0;
            z-index: 50;
        }

        /* Mobile Sidebar handling */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .mobile-menu-btn { display: block; }
        }
        @media (min-width: 769px) {
            .mobile-menu-btn { display: none; }
        }

        /* Code Editor Look */
        .code-view {
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            color: #a5b4fc;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="p-4 border-b border-gray-800">
            <button onclick="createNewProject()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition flex items-center justify-center gap-2">
                <i class="fas fa-plus"></i> New Project
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-2 space-y-2" id="projectList">
            </div>

        <div class="p-4 border-t border-gray-800">
            <button onclick="openSettings()" class="w-full text-gray-400 hover:text-white flex items-center gap-3 p-2 rounded hover:bg-gray-800 transition">
                <i class="fas fa-cog text-xl"></i> Settings
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-[100dvh] relative w-full">
        
        <header class="h-14 bg-slate-900 border-b border-gray-800 flex items-center justify-between px-4 flex-shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="mobile-menu-btn text-gray-400 hover:text-white">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                </div>
                <span class="text-sm font-semibold text-gray-400 ml-2" id="currentProjectName">Untitled Project</span>
            </div>

            <div class="flex items-center gap-3">
                <div class="bg-gray-800 rounded-lg p-1 flex text-xs">
                    <button id="btnPreview" onclick="setView('preview')" class="px-3 py-1 rounded bg-gray-700 text-white shadow">Preview</button>
                    <button id="btnCode" onclick="setView('code')" class="px-3 py-1 rounded text-gray-400 hover:text-white">Code</button>
                </div>
                <button onclick="downloadCode()" class="text-gray-400 hover:text-green-400 transition" title="Download index.html">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 relative bg-black overflow-hidden">
            <div id="loadingOverlay" class="absolute inset-0 bg-black/50 z-20 hidden flex items-center justify-center backdrop-blur-sm">
                <div class="bg-gray-800 p-4 rounded-lg flex items-center gap-3 shadow-xl">
                    <div class="loader" style="display:block"></div>
                    <span>Generating...</span>
                </div>
            </div>

            <iframe id="previewFrame" class="w-full h-full bg-white border-none block"></iframe>

            <div id="codeContainer" class="w-full h-full bg-gray-900 p-4 overflow-auto hidden">
                <pre class="code-view" id="codeDisplay"></pre>
            </div>
        </div>

        <footer class="p-4 bg-slate-900 border-t border-gray-800 flex-shrink-0">
            <div class="relative max-w-4xl mx-auto">
                <textarea id="promptInput" 
                    class="w-full bg-gray-800 text-white rounded-lg pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-blue-600 resize-none h-14"
                    placeholder="Describe your website... (e.g., 'A landing page for a coffee shop')"></textarea>
                <button onclick="generateSite()" class="absolute right-2 top-2 p-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-white transition">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-md p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4">Settings</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">API URL (CRITICAL: Do not change unless necessary)</label>
                    <input type="text" id="apiUrl" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm text-blue-300" 
                           value="https://openrouter.ai/api/v1/chat/completions">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">API Key</label>
                    <input type="password" id="apiKey" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm" 
                           placeholder="sk-or-...">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Model ID</label>
                    <input type="text" id="modelId" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm" 
                           value="deepseek/deepseek-r1:free">
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-4 py-2 text-gray-400 hover:text-white">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded">Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTS & STATE ---
        // CRITICAL FIX 1: Force OpenRouter Endpoint
        const DEFAULT_API_URL = "https://openrouter.ai/api/v1/chat/completions";
        const DEFAULT_MODEL = "deepseek/deepseek-r1:free";
        const SYSTEM_PROMPT = "You are a web developer. Output ONLY raw HTML code for the requested website. Do not include markdown backticks (```html). Do not include explanations. Do not include CSS in separate files, use inline styles or internal <style> tags. The code must be a complete single file.";

        let projects = [];
        let currentProjectId = null;
        let currentCode = "";

        // --- INITIALIZATION ---
        window.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            loadProjects();
            
            // Auto-create new project if none exist
            if (projects.length === 0) {
                createNewProject();
            } else {
                loadProject(projects[0].id);
            }
        });

        // --- SETTINGS LOGIC ---
        function openSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
            document.getElementById('apiUrl').value = localStorage.getItem('builder_api_url') || DEFAULT_API_URL;
            document.getElementById('apiKey').value = localStorage.getItem('builder_api_key') || '';
            document.getElementById('modelId').value = localStorage.getItem('builder_model_id') || DEFAULT_MODEL;
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function saveSettings() {
            const url = document.getElementById('apiUrl').value.trim();
            const key = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelId').value.trim();

            localStorage.setItem('builder_api_url', url);
            localStorage.setItem('builder_api_key', key);
            localStorage.setItem('builder_model_id', model);
            
            closeSettings();
            alert("Settings Saved!");
        }

        function loadSettings() {
            if (!localStorage.getItem('builder_api_url')) {
                localStorage.setItem('builder_api_url', DEFAULT_API_URL);
            }
            if (!localStorage.getItem('builder_model_id')) {
                localStorage.setItem('builder_model_id', DEFAULT_MODEL);
            }
        }

        // --- PROJECT MANAGEMENT ---
        function loadProjects() {
            const stored = localStorage.getItem('builder_projects');
            projects = stored ? JSON.parse(stored) : [];
            renderProjectList();
        }

        function saveProjects() {
            localStorage.setItem('builder_projects', JSON.stringify(projects));
            renderProjectList();
        }

        function createNewProject() {
            const newId = Date.now().toString();
            const newProject = {
                id: newId,
                name: "New Project " + (projects.length + 1),
                code: "<h1>Hello World</h1>"
            };
            projects.unshift(newProject);
            saveProjects();
            loadProject(newId);
        }

        function loadProject(id) {
            currentProjectId = id;
            const project = projects.find(p => p.id === id);
            if (!project) return;

            currentCode = project.code;
            document.getElementById('currentProjectName').textContent = project.name;
            updateViews(currentCode);
            renderProjectList();
            
            // On mobile, close sidebar after selection
            document.getElementById('sidebar').classList.remove('open');
        }

        function renderProjectList() {
            const list = document.getElementById('projectList');
            list.innerHTML = '';
            projects.forEach(p => {
                const isActive = p.id === currentProjectId;
                const div = document.createElement('div');
                div.className = `p-3 rounded cursor-pointer text-sm truncate ${isActive ? 'bg-blue-900/50 text-blue-200 border border-blue-800' : 'text-gray-400 hover:bg-gray-800'}`;
                div.textContent = p.name;
                div.onclick = () => loadProject(p.id);
                list.appendChild(div);
            });
        }

        // --- UI LOGIC ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function setView(mode) {
            const preview = document.getElementById('previewFrame');
            const code = document.getElementById('codeContainer');
            const btnPreview = document.getElementById('btnPreview');
            const btnCode = document.getElementById('btnCode');

            if (mode === 'preview') {
                preview.classList.remove('hidden');
                preview.classList.add('block');
                code.classList.add('hidden');
                
                btnPreview.className = "px-3 py-1 rounded bg-gray-700 text-white shadow";
                btnCode.className = "px-3 py-1 rounded text-gray-400 hover:text-white";
            } else {
                preview.classList.add('hidden');
                preview.classList.remove('block');
                code.classList.remove('hidden');

                btnPreview.className = "px-3 py-1 rounded text-gray-400 hover:text-white";
                btnCode.className = "px-3 py-1 rounded bg-gray-700 text-white shadow";
            }
        }

        function updateViews(html) {
            // Update Iframe
            const frame = document.getElementById('previewFrame');
            frame.srcdoc = html;

            // Update Code View
            document.getElementById('codeDisplay').textContent = html;
        }

        function downloadCode() {
            const blob = new Blob([currentCode], { type: 'text/html' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        // --- AI GENERATION LOGIC ---
        async function generateSite() {
            const promptText = document.getElementById('promptInput').value.trim();
            if (!promptText) return;

            const apiKey = localStorage.getItem('builder_api_key');
            if (!apiKey) {
                alert("Please set your API Key in Settings first.");
                openSettings();
                return;
            }

            const apiUrl = localStorage.getItem('builder_api_url');
            const modelId = localStorage.getItem('builder_model_id');

            // UI Loading State
            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            try {
                // CRITICAL FIX 2: Anti-Crash JSON Logic
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href, // Required by OpenRouter
                        'X-Title': 'AI Website Builder'
                    },
                    body: JSON.stringify({
                        model: modelId,
                        messages: [
                            { role: "system", content: SYSTEM_PROMPT },
                            { role: "user", content: `Create a website with this description: ${promptText}. Remember, output ONLY raw HTML.` }
                        ]
                    })
                });

                // 1. Get Text First
                const text = await response.text();

                // 2. Check HTTP Status
                if (!response.ok) {
                    alert("API Error:\n" + text);
                    throw new Error("API Request Failed");
                }

                // 3. Parse JSON safely
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    alert("Failed to parse JSON response: " + e.message);
                    throw e;
                }

                // Extract Content
                let content = data.choices[0]?.message?.content || "";

                // Cleanup Markdown if the AI disobeyed
                content = content.replace(/```html/g, '').replace(/```/g, '');

                // Update State
                currentCode = content;
                
                // Update Project Name (Simple Logic)
                const project = projects.find(p => p.id === currentProjectId);
                if (project) {
                    project.code = currentCode;
                    project.name = promptText.substring(0, 20) + "...";
                    saveProjects();
                }

                updateViews(currentCode);
                document.getElementById('promptInput').value = ''; // Clear input

            } catch (error) {
                console.error(error);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
